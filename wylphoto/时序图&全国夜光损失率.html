    '2023-01', '2023-02', '2023-03',

];

var tnlData = [
    2594711.43, 2722779.69, 3353225.67, 2493008.06, 1707588.48,

    1880494.08, 2358258.35, 1926333.38,
    1893328.86, 1913595.70, 2146540.18, 1668756.95
];

// 计算环比变化率（%）
var changeRateData = [];
for (var i = 0; i < tnlData.length; i++) {
    if (i === 0) {
        changeRateData.push(null);
    } else {
        var change = ((tnlData[i] - tnlData[i-1]) / tnlData[i-1]) * 100;
        changeRateData.push(parseFloat(change.toFixed(1)));
    }
}
