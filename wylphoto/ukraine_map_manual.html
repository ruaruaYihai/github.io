            { name: "Zakarpats'ka", value: -7.82 },
            { name: 'Chernovtsy', value: -19.04 },
            { name: 'Nikolayev', value: -24.61 },
            { name: 'Odessa', value: -19.81 },
            { name: "Zaporozh'ye", value: -20.83 },
            { name: 'Crimean', value: -9.73 },
            { name: 'Kherson', value: -25.24 }
        ];

        // 转换为显示用的中文数据（用于地图和条形图显示）
        var nightlightDataDisplay = nightlightDataRaw.map(function(item) {
            return {
                name: nameMap[item.name] || item.name,
                value: item.value,
                englishName: item.name
            };
        });

        // 创建快速查找映射表（英文名 → 数据）
        var dataMap = {};
        nightlightDataRaw.forEach(function(item) {
            dataMap[item.name] = item.value;
        });

        // 按损失率排序（用于条形图）
        var sortedData = [...nightlightDataDisplay].sort(function(a, b) {
            return a.value - b.value;
        });

        var dom = document.getElementById('container');
        var myChart = echarts.init(dom);

        myChart.showLoading({
            text: '正在加载地图数据...',
            color: '#5470c6',
            textColor: '#333',
            maskColor: 'rgba(255, 255, 255, 0.8)'
        });

        // 处理 GeoJSON：将 ADMIN_NAME 替换为中文名
        function processGeoJson(geojson) {
            if (geojson && geojson.features) {
                geojson.features.forEach(function(feature) {
                    if (feature.properties && feature.properties.ADMIN_NAME) {
                        var engName = feature.properties.ADMIN_NAME;
                        if (nameMap[engName]) {
                            feature.properties.ADMIN_NAME = nameMap[engName];
                        }
                    }
                });
            }
            return geojson;
        }

        // 检查 GeoJSON 是否正确加载
        if (typeof ukraineGeoJson === 'undefined' || ukraineGeoJson === null || 
            (typeof ukraineGeoJson === 'string' && ukraineGeoJson.includes('请在此处粘贴'))) {
            myChart.hideLoading();
            myChart.setOption({
                title: {
                    text: '❌ GeoJSON 数据未加载',
                    subtext: '请将 Provinces.geojson 文件内容粘贴到代码中指定的位置',
                    left: 'center',
                    top: 'center',
                    textStyle: { color: 'red', fontSize: 14 }
                }
            });
            console.error('错误：请将 GeoJSON 文件内容粘贴到变量 ukraineGeoJson 中');
        } else {
            // 确保 ukraineGeoJson 是对象
            var geojsonObj = (typeof ukraineGeoJson === 'string') ? JSON.parse(ukraineGeoJson) : ukraineGeoJson;
            
            // 处理 GeoJSON，将 ADMIN_NAME 替换为中文
            geojsonObj = processGeoJson(geojsonObj);
            
            myChart.hideLoading();

            // 调试：检查匹配情况
            var geoNames = [];
            if (geojsonObj.features) {
                geojsonObj.features.forEach(function(feature) {
                    if (feature.properties && feature.properties.ADMIN_NAME) {
                        geoNames.push(feature.properties.ADMIN_NAME);
                    }
                });
                var matchCount = 0;
                nightlightDataDisplay.forEach(function(item) {
                    if (geoNames.includes(item.name)) matchCount++;
                });
                console.log('匹配成功:', matchCount, '/', nightlightDataDisplay.length);
            }

            // 注册乌克兰地图
            echarts.registerMap('ukraine', geojsonObj);

            // ============================================================
            // 地图配置选项（使用中文名称）
            // ============================================================
            const mapOption = {
                title: {
                    text: '乌克兰夜光损失率分布图',
                    subtext: '2021.11-12 vs 2023.11-12 | 负值越大红色越深',
                    left: 'center',
                    top: 10,
                    textStyle: {
                        fontSize: 16,
                        fontWeight: 'bold',
                        color: '#333'
                    }
                },
                tooltip: {
                    trigger: 'item',
                    formatter: function(params) {
                        var value = params.value;
                        if (value !== undefined && value !== null) {
                            var color = value < 0 ? '#d73027' : '#74add1';
                            var trend = value < 0 ? '▼ 下降' : '▲ 上升';
                            return '<strong>' + params.name + '</strong><br/>' +
                                '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + color + ';margin-right:5px;"></span>' +
                                '夜光损失率：<b style="color:' + color + '">' + value.toFixed(2) + '%</b><br/>' +
                                '<span style="color:' + color + '">' + trend + '</span>';
                        }
                        return '<strong>' + params.name + '</strong><br/>数据缺失';
                    }
                },
                visualMap: {
                    type: 'continuous',
                    left: 'left',
                    bottom: 20,
                    min: -45,
                    max: 5,
                    calculable: true,
                    inRange: {
                        color: ['#a50026', '#d73027', '#f46d43', '#fdae61', '#fee090', '#ffffbf', '#e0f3f8', '#abd9e9', '#74add1', '#4575b4', '#313695']
                    },
                    text: ['损失严重', '损失轻微/增长'],
                    textStyle: { fontSize: 12, color: '#333' },
                    formatter: function(value) { return value.toFixed(1) + '%'; }
                },
                series: [{
                    id: 'nightlight_loss',
                    name: '夜光损失率',
                    type: 'map',
                    map: 'ukraine',
                    roam: true,
                    zoom: 1.15,
                    center: [31.5, 49.0],
                    animationDurationUpdate: 500,
                    universalTransition: true,
                    data: nightlightDataDisplay,
                    nameProperty: 'ADMIN_NAME',
                    label: {
                        show: true,
                        fontSize: 10,
                        formatter: function(params) {
                            // 显示损失严重和关键区域的中文名
                            if (params.value && params.value < -25) return params.name;
                            if (params.name === '基辅' || params.name === '卢甘斯克') return params.name;
                            return '';
                        },
                        color: '#333',
                        fontWeight: 'bold'
                    },
                    emphasis: {
                        label: { show: true, fontSize: 12, fontWeight: 'bold', backgroundColor: 'rgba(255,255,255,0.8)', padding: [2,5,2,5], borderRadius: 3 },
                        scale: 1.05,
                        itemStyle: { shadowBlur: 10, shadowOffsetX: 0, shadowColor: 'rgba(0,0,0,0.3)' }
                    },
                    itemStyle: { borderColor: '#666', borderWidth: 0.5, areaColor: '#f5f5f5' }
                }]
            };

            // ============================================================
            // 条形图配置选项（使用中文名称）
            // ============================================================
            const barOption = {
                title: {
                    text: '乌克兰各州夜光损失率排行榜',
                    subtext: '负值越大代表夜光损失越严重 | 唯一正值：卢甘斯克 (+0.14%)',
                    left: 'center',
                    top: 10,
                    textStyle: { fontSize: 16, fontWeight: 'bold', color: '#333' }
                },
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' },
                    formatter: function(params) {
                        var val = params[0].value;
                        var trend = val < 0 ? '▼ 下降' : '▲ 上升';
                        var color = val < 0 ? '#d73027' : '#74add1';
                        return '<strong>' + params[0].name + '</strong><br/>' +
                            '夜光损失率：<b style="color:' + color + '">' + val.toFixed(2) + '%</b><br/>' +
                            '<span style="color:' + color + '">' + trend + '</span>';
                    }
                },
                xAxis: {
                    type: 'value',
                    name: '夜光损失率 (%)',
                    nameLocation: 'middle',
                    nameGap: 35,
                    axisLabel: { formatter: function(value) { return value.toFixed(0) + '%'; } },
                    axisLine: { lineStyle: { color: '#333' } },
                    splitLine: { lineStyle: { color: '#ddd', type: 'dashed' } }
                },
                yAxis: {
                    type: 'category',
                    data: sortedData.map(function(item) { return item.name; }),
                    axisLabel: { fontSize: 11, rotate: 0 },
                    name: '行政区',
                    nameLocation: 'middle',
                    nameGap: 55,
                    axisLine: { show: false },
                    axisTick: { show: false }
                },
                grid: {
                    left: '14%',
                    right: '8%',
                    top: '18%',
                    bottom: '5%',
                    containLabel: true,
                    backgroundColor: '#fafafa'
                },
                animationDurationUpdate: 500,
                series: [{
                    type: 'bar',
                    id: 'nightlight_loss',
                    name: '夜光损失率',
                    data: sortedData.map(function(item) {
                        var isNegative = item.value < 0;
                        return {
                            name: item.name,
                            value: item.value,
                            itemStyle: {
                                color: isNegative ? 
                                    (item.value < -35 ? '#a50026' :
                                     item.value < -25 ? '#d73027' :
                                     item.value < -15 ? '#f46d43' : '#fdae61') : '#74add1',
                                borderRadius: [0, 4, 4, 0]
                            }
                        };
                    }),
                    universalTransition: true,
                    label: {
                        show: true,
                        position: 'right',
                        formatter: function(params) { return params.value.toFixed(1) + '%'; },
                        fontSize: 10,
                        fontWeight: 'bold'
                    },
                    showBackground: true,
                    backgroundStyle: { color: '#eee', borderRadius: 4 }
                }]
            };

            // ============================================================
            // 手动切换控制（无自动切换）
            // ============================================================
            let currentView = 'map';  // 'map' 或 'bar'
            
            // 切换到地图
            function switchToMap() {
                myChart.setOption(mapOption, true);
                currentView = 'map';
                document.getElementById('currentView').innerHTML = '🗺️ 当前：地图视图';
                document.getElementById('btnMap').style.opacity = '1';
                document.getElementById('btnBar').style.opacity = '0.6';
                document.getElementById('btnMap').style.boxShadow = '0 0 0 2px white, 0 0 0 4px #5470c6';
                document.getElementById('btnBar').style.boxShadow = 'none';
            }
            
            // 切换到条形图
            function switchToBar() {
                myChart.setOption(barOption, true);
                currentView = 'bar';
                document.getElementById('currentView').innerHTML = '📊 当前：条形图视图';
                document.getElementById('btnBar').style.opacity = '1';
                document.getElementById('btnMap').style.opacity = '0.6';
                document.getElementById('btnBar').style.boxShadow = '0 0 0 2px white, 0 0 0 4px #fa8231';
                document.getElementById('btnMap').style.boxShadow = 'none';
            }
            
            // 绑定按钮点击事件
            document.getElementById('btnMap').addEventListener('click', switchToMap);
            document.getElementById('btnBar').addEventListener('click', switchToBar);
            
            // 初始显示地图
            switchToMap();
        }
    </script>
</body>
</html>
